<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arsenal CRS">
<meta name="theme-color" content="#0f172a">
<title>Arsenal CRS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #293548;
    --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
    --green: #22c55e; --red: #ef4444; --orange: #f97316;
    --blue: #38bdf8; --accent: #6366f1;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    padding-top: max(env(safe-area-inset-top), 12px);
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  #searchInput {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 40px 10px 38px;
    color: var(--text); font-size: 16px; outline: none;
    -webkit-appearance: none;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--border); border: none; border-radius: 50%; width: 20px; height: 20px; color: var(--muted); font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; }
  .clear-btn.show { display: flex; }

  /* ── Filters ── */
  .filters { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; white-space: nowrap;
    transition: all .15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── Results ── */
  #results {
    height: calc(100vh - var(--header-h, 180px));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 0 env(safe-area-inset-bottom, 16px);
  }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }
  .result-count { font-size: 12px; color: var(--muted); padding: 4px 16px 8px; }

  /* ── Card ── */
  .card {
    margin: 6px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: border-color .15s;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card:active { background: var(--surface2); }
  .card-header { padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
  .card-main { flex: 1; min-width: 0; }
  .med-nombre { font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--text); }
  .med-codigo { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'SF Mono', monospace; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
    border: 1px solid; white-space: nowrap;
  }
  .badge-green { color: var(--green); border-color: #166534; background: #052e16; }
  .badge-red { color: var(--red); border-color: #7f1d1d; background: #1c0a0a; }
  .badge-orange { color: var(--orange); border-color: #7c2d12; background: #1c0d04; }
  .badge-blue { color: var(--blue); border-color: #0c4a6e; background: #041c2c; }

  /* ── Detail (expandido) ── */
  .card-detail { display: none; border-top: 1px solid var(--border); padding: 12px 14px; gap: 8px; flex-direction: column; }
  .card.open .card-detail { display: flex; }
  .detail-row { display: flex; gap: 8px; align-items: flex-start; }
  .detail-label { font-size: 12px; color: var(--muted); min-width: 80px; flex-shrink: 0; padding-top: 1px; }
  .detail-value { font-size: 13px; color: var(--text); flex: 1; }
  .location-box {
    background: var(--surface2); border-radius: 10px; padding: 10px 12px;
    border: 1px solid var(--border); margin-top: 2px;
  }
  .location-name { font-size: 12px; color: var(--blue); font-weight: 600; margin-bottom: 5px; }
  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .loc-item { background: var(--surface); border-radius: 8px; padding: 6px 10px; }
  .loc-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .loc-val { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 1px; }
  .no-location { font-size: 13px; color: var(--muted); font-style: italic; }
  .restriccion-box {
    background: #1c0d04; border: 1px solid #7c2d12; border-radius: 8px;
    padding: 8px 10px; font-size: 12px; color: var(--orange); line-height: 1.4;
  }
</style>
</head>
<body>
<header id="appHeader">
  <div class="header-top">
    <div class="logo">💊</div>
    <div>
      <div class="header-title">Arsenal CRS</div>
      <div class="header-sub" id="totalCount">Cargando...</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="search" placeholder="Buscar medicamento, código…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="filters">
    <button class="filter-btn" onclick="toggleFilter('disponible')">✓ Disponibles</button>
    <button class="filter-btn" onclick="toggleFilter('riesgo')">⚠ Alto riesgo</button>
    <button class="filter-btn" onclick="toggleFilter('ubicacion')">📍 Con ubicación</button>
  </div>
</header>

<div id="results">
  <div class="empty"><div class="empty-icon">🔍</div><p>Escribe para buscar<br>entre los 452 medicamentos</p></div>
</div>

;

const filters = { disponible: false, riesgo: false, ubicacion: false };
let lastQuery = '';
let headerH = 0;

function norm(t) {
  return (t||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}

function calcHeader() {
  headerH = document.getElementById('appHeader').offsetHeight;
  document.getElementById('results').style.height = `calc(100dvh - ${headerH}px)`;
}

window.addEventListener('resize', calcHeader);
window.addEventListener('load', calcHeader);

document.getElementById('totalCount').textContent = `${MEDS.length} medicamentos`;

document.getElementById('searchInput').addEventListener('input', function() {
  const v = this.value;
  document.getElementById('clearBtn').classList.toggle('show', v.length > 0);
  lastQuery = v;
  render(v);
});

function clearSearch() {
  const inp = document.getElementById('searchInput');
  inp.value = '';
  document.getElementById('clearBtn').classList.remove('show');
  lastQuery = '';
  render('');
  inp.focus();
}

function toggleFilter(f) {
  filters[f] = !filters[f];
  document.querySelectorAll('.filter-btn').forEach((btn, i) => {
    const keys = ['disponible','riesgo','ubicacion'];
    btn.classList.toggle('active', filters[keys[i]]);
  });
  render(lastQuery);
}

function highlight(text, query) {
  if (!query) return text;
  const nq = norm(query);
  const nt = norm(text);
  const idx = nt.indexOf(nq);
  if (idx === -1) return text;
  return text.substring(0, idx) + '<mark style="background:#6366f140;color:inherit;border-radius:3px">' + text.substring(idx, idx + nq.length) + '</mark>' + text.substring(idx + nq.length);
}

function render(q) {
  const nq = norm(q);
  let results = MEDS.filter(m => {
    if (filters.disponible && !m.disponible) return false;
    if (filters.riesgo && !m.alto_riesgo) return false;
    if (filters.ubicacion && !m.estanteria) return false;
    if (!nq) return true;
    return norm(m.nombre).includes(nq) || norm(m.codigo).includes(nq) || norm(m.subgrupo||'').includes(nq);
  });

  const el = document.getElementById('results');

  if (!nq && !filters.disponible && !filters.riesgo && !filters.ubicacion) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Escribe para buscar<br>entre los ' + MEDS.length + ' medicamentos</p></div>';
    return;
  }

  if (results.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">😕</div><p>Sin resultados para<br><strong>"' + q + '"</strong></p></div>';
    return;
  }

  let html = `<div class="result-count">${results.length} resultado${results.length!==1?'s':''}</div>`;
  results.forEach((m, i) => {
    const dispBadge = m.disponible
      ? '<span class="badge badge-green">✓ Disponible</span>'
      : '<span class="badge badge-red">✗ No disponible</span>';
    const riesgoBadge = m.alto_riesgo ? '<span class="badge badge-orange">⚠ Alto riesgo</span>' : '';
    const ubiBadge = m.estanteria ? '<span class="badge badge-blue">📍 ' + m.estanteria.split('(')[0].trim() + '</span>' : '';

    const ubicacionHtml = m.estanteria ? `
      <div class="location-box">
        <div class="location-name">📍 ${m.estanteria}</div>
        <div class="location-grid">
          <div class="loc-item"><div class="loc-key">Fila</div><div class="loc-val">${m.fila}</div></div>
          <div class="loc-item"><div class="loc-key">Columna(s)</div><div class="loc-val">${m.columnas}</div></div>
        </div>
      </div>` : '<span class="no-location">No registrada en estanterías</span>';

    const restriccionHtml = m.restriccion
      ? `<div class="restriccion-box">🔒 ${m.restriccion}</div>` : '';

    html += `
    <div class="card" onclick="toggleCard(this)">
      <div class="card-header">
        <div class="card-main">
          <div class="med-nombre">${highlight(m.nombre, q)}</div>
          <div class="med-codigo">${m.codigo}</div>
          <div class="badges">${dispBadge}${riesgoBadge}${ubiBadge}</div>
        </div>
        <span style="color:var(--muted);font-size:18px;margin-top:2px">›</span>
      </div>
      <div class="card-detail">
        <div class="detail-row">
          <span class="detail-label">Subgrupo</span>
          <span class="detail-value">${m.subgrupo || '—'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Ubicación</span>
          <div style="flex:1">${ubicacionHtml}</div>
        </div>
        ${m.restriccion ? `<div class="detail-row"><span class="detail-label">Restricción</span><div style="flex:1">${restriccionHtml}</div></div>` : ''}
      </div>
    </div>`;
  });

  el.innerHTML = html;
  el.scrollTop = 0;
}

function toggleCard(card) {
  card.classList.toggle('open');
  calcHeader();
}
</script>
